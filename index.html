<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>페르소나 가상 투표 실험</title>
  <style>
    :root {
      --fg: #222;
      --muted: #888;
      --accent: #004EA2;
      --bg: #fafafa;
      --card-bg: #fff;
      --border: #e5e5e5;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", sans-serif;
      background: var(--bg);
      color: var(--fg);
      line-height: 1.55;
    }
    main {
      max-width: 760px;
      margin: 0 auto;
      padding: 64px 24px 48px;
    }
    h1 {
      font-size: 1.85rem;
      margin: 0 0 6px;
    }
    .subtitle {
      color: var(--muted);
      font-size: 0.95rem;
      margin: 0 0 32px;
    }
    .menu {
      display: grid;
      gap: 16px;
      grid-template-columns: 1fr;
    }
    @media (min-width: 640px) {
      .menu { grid-template-columns: 1fr 1fr; }
    }
    a.card {
      display: block;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 22px 22px 20px;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.15s, transform 0.15s, box-shadow 0.15s;
    }
    a.card:hover {
      border-color: var(--accent);
      box-shadow: 0 4px 12px rgba(0, 78, 162, 0.08);
      transform: translateY(-1px);
    }
    .card h2 {
      margin: 0 0 6px;
      font-size: 1.1rem;
      color: var(--accent);
    }
    .card p {
      margin: 0;
      font-size: 0.9rem;
      color: var(--muted);
    }
    footer {
      margin-top: 48px;
      font-size: 0.82rem;
      color: var(--muted);
    }
    footer a { color: var(--muted); }
  </style>
</head>
<body>
  <main>
    <h1>🗳️ 페르소나 가상 투표 실험</h1>
    <p class="subtitle">
      합성 페르소나(Nemotron-Personas-Korea) 기반 LLM 투표 시뮬레이션.
    </p>

    <nav class="menu">
      <a class="card" href="./dashboard.html">
        <h2>📊 대시보드 →</h2>
        <p>모델·버전별 정당 득표율, 인구통계 교차분석, 전체 응답 탐색.</p>
      </a>
      <a class="card" href="./compare.html">
        <h2>🔍 페르소나별 응답 비교 →</h2>
        <p>같은 100명에게 v2 → v6 까지 컨텍스트를 바꾸며 받은 응답을 페르소나별로 나란히 비교.</p>
      </a>
    </nav>

    <footer>
      소스: <a href="https://github.com/vuski/persona-million" target="_blank">github.com/vuski/persona-million</a>
    </footer>
  </main>
</body>
</html>
