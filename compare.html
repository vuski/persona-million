<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>페르소나 가상 투표 — 응답 비교</title>
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/@stlite/browser@0.85.1/build/stlite.css"
  />
  <style>
    body { margin: 0; }
    #loading {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #666;
      flex-direction: column;
      gap: 12px;
    }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid #eee;
      border-top-color: #004EA2;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .topnav {
      position: fixed; top: 8px; left: 12px; z-index: 10000;
      font: 0.82em -apple-system, sans-serif;
    }
    .topnav a { color: #888; text-decoration: none; }
    .topnav a:hover { color: #004EA2; text-decoration: underline; }
  </style>
</head>
<body>
  <div class="topnav">
    <a href="./index.html">← 메뉴</a> · <a href="./dashboard.html">📊 대시보드</a>
  </div>
  <div id="root">
    <div id="loading">
      <div class="spinner"></div>
      <div>응답 비교 페이지 로딩 중… (Pyodide 다운로드, 첫 방문 시 5~10초)</div>
    </div>
  </div>

  <script type="module">
    import { mount } from "https://cdn.jsdelivr.net/npm/@stlite/browser@0.85.1/build/stlite.js";

    // 데이터 fetch
    const csvText = await (await fetch("./backend/vote_results_all.csv")).text();
    const interestsTsv = await (await fetch("./backend/interests/personas_gpt-5.4-mini_all_interests.tsv")).text();
    // compareV2V3.py 본문
    let appPy = await (await fetch("./backend/compareV2V3.py")).text();

    // 로컬 경로를 stlite 가상 FS 경로로 치환
    appPy = appPy
      .replace('BASE = Path(__file__).resolve().parent', 'BASE = Path(".")')
      .replace('RESULTS_PATH = BASE / "vote_results_all.csv"', 'RESULTS_PATH = Path("vote_results_all.csv")')
      .replace('INTERESTS_PATH = BASE / "interests" / "personas_gpt-5.4-mini_all_interests.tsv"',
               'INTERESTS_PATH = Path("personas_interests.tsv")')
      .replace('CONTEXT_DIR = BASE / "context"', 'CONTEXT_DIR = Path(".")');

    // voter_context_v*.md / system_prompt_v*.md 수집
    async function collectVersions(prefix) {
      const found = {};
      for (let i = 1; i <= 9; i++) {
        const r = await fetch(`./backend/context/${prefix}_v${i}.md`);
        if (r.ok) found[`${prefix}_v${i}.md`] = await r.text();
      }
      return found;
    }
    const voterCtxFiles = await collectVersions("voter_context");
    const systemPromptFiles = await collectVersions("system_prompt");

    mount({
      requirements: ["pandas"],
      entrypoint: "app.py",
      files: {
        "app.py": appPy,
        "vote_results_all.csv": csvText,
        "personas_interests.tsv": interestsTsv,
        ...voterCtxFiles,
        ...systemPromptFiles,
      },
    }, document.getElementById("root"));
  </script>
</body>
</html>
